name: Build Windows executable

# Reached two ways: called by release.yml (as a reusable workflow, via
# `uses:`) once its test jobs pass on a real version-tag push -- see that
# file for why tests now gate this rather than the two running
# independently off the same tag -- or run standalone via manual dispatch
# (Actions tab -> this workflow -> "Run workflow") to test a Windows build
# in isolation without going through the whole pipeline. Either way, the
# "Attach to GitHub release" step below only actually fires on a real tag
# ref (`github.ref` is inherited correctly from the triggering event even
# when called via `uses:`); a dispatched run (direct or via release.yml's
# own workflow_dispatch) just uploads a build artifact.
permissions:
  contents: write

on:
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Download bundled ffmpeg/ffprobe (LGPL static build)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dest = "packaging/windows/vendor/ffmpeg"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zipUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extracted
          $binDir = (Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1).Directory.FullName
          Copy-Item "$binDir\ffmpeg.exe" $dest
          Copy-Item "$binDir\ffprobe.exe" $dest

      - name: Build with PyInstaller
        run: pyinstaller packaging/windows/parztream.spec --distpath dist --workpath build --noconfirm

      - name: Rename artifact
        shell: pwsh
        run: Rename-Item -Path "dist/parztream.exe" -NewName "parztream-windows.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parztream-windows
          path: dist/parztream-windows.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/parztream-windows.exe
