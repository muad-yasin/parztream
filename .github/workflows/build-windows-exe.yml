name: Build Windows executable

# Runs on a version tag push (v1.2.0 etc.) and attaches the result to the
# matching GitHub Release. Also runnable manually (Actions tab -> this
# workflow -> "Run workflow") without a tag, which just uploads the exe as
# a build artifact -- use that to test a build before actually cutting a
# release.
permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Download bundled ffmpeg/ffprobe (LGPL static build)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dest = "packaging/windows/vendor/ffmpeg"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zipUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extracted
          $binDir = (Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1).Directory.FullName
          Copy-Item "$binDir\ffmpeg.exe" $dest
          Copy-Item "$binDir\ffprobe.exe" $dest

      - name: Build with PyInstaller
        run: pyinstaller packaging/windows/parztream.spec --distpath dist --workpath build --noconfirm

      - name: Rename artifact
        shell: pwsh
        run: Rename-Item -Path "dist/parztream.exe" -NewName "parztream-windows.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parztream-windows
          path: dist/parztream-windows.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/parztream-windows.exe
