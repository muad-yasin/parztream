name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Real ffmpeg/ffprobe on PATH so the integration tests marked
      # requires_ffmpeg actually run here instead of silently skipping.
      # Ubuntu uses the distro package: setup-ffmpeg's Linux build was
      # observed to SIGSEGV in ffprobe when reading the MPEG-TS segments
      # app/transcode.py produces (first run of this workflow) -- apt's
      # build is solid. No such issue with its Windows build.
      - name: Install ffmpeg (apt)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (setup-ffmpeg)
        if: runner.os == 'Windows'
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  e2e:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Same reasoning as the unit job: apt's build, not setup-ffmpeg's.
      - name: Install ffmpeg (apt)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      # pytest.ini excludes tests/e2e from the default run; blank out
      # addopts to run it explicitly here.
      - name: Run E2E tests
        run: pytest tests/e2e -o addopts="" -v
