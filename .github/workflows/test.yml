name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Real ffmpeg/ffprobe on PATH so the integration tests marked
      # requires_ffmpeg actually run here instead of silently skipping.
      - uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  e2e:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      # pytest.ini excludes tests/e2e from the default run; blank out
      # addopts to run it explicitly here.
      - name: Run E2E tests
        run: pytest tests/e2e -o addopts="" -v
