name: Release

# Runs on a version tag push (v1.2.0 etc.) or manual dispatch (Actions tab ->
# this workflow -> "Run workflow") -- previously this file (test.yml) ran on
# every push to master and every PR instead. That gave faster feedback on
# individual commits, but with no PR-review gate in this project's workflow
# it was the only thing exercising the suite at all; moved to release-only on
# a deliberate trade-off (a regression is now only caught at release time,
# not at the commit that introduced it), a call this project's maintainer
# made after weighing the (small) per-commit CI cost against that trade-off.
#
# The 3 build-*.yml workflows used to trigger independently on the same tag
# push, with nothing stopping a broken build from being built and attached
# to a release even if tests would have failed. They're now called here as
# reusable workflows (`uses:`), gated on `needs: [unit, e2e]` -- a build can
# no longer happen unless tests already passed. Each build-*.yml keeps its
# own `workflow_dispatch` trigger too, so a single platform can still be
# built standalone from the Actions tab without going through this whole
# pipeline (e.g. to test packaging changes in isolation).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Real ffmpeg/ffprobe on PATH so the integration tests marked
      # requires_ffmpeg actually run here instead of silently skipping.
      # Ubuntu uses the distro package: setup-ffmpeg's Linux build was
      # observed to SIGSEGV in ffprobe when reading the MPEG-TS segments
      # app/transcode.py produces (first run of this workflow) -- apt's
      # build is solid. No such issue with its Windows build.
      - name: Install ffmpeg (apt)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (setup-ffmpeg)
        if: runner.os == 'Windows'
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  e2e:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Same reasoning as the unit job: apt's build, not setup-ffmpeg's.
      - name: Install ffmpeg (apt)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      # pytest.ini excludes tests/e2e from the default run; blank out
      # addopts to run it explicitly here.
      - name: Run E2E tests
        run: pytest tests/e2e -o addopts="" -v

  build-linux:
    needs: [unit, e2e]
    uses: ./.github/workflows/build-linux-appimage.yml
    permissions:
      contents: write

  build-macos:
    needs: [unit, e2e]
    uses: ./.github/workflows/build-macos-app.yml
    permissions:
      contents: write

  build-windows:
    needs: [unit, e2e]
    uses: ./.github/workflows/build-windows-exe.yml
    permissions:
      contents: write
