<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#14161a">
  <title>parztream</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header>
    <h1>parztream</h1>
    <div class="controls">
      <label for="search-input" class="sr-only">Search library</label>
      <input id="search-input" type="search" placeholder="Search…">

      <label for="filter" class="sr-only">Filter by media type</label>
      <select id="filter">
        <option value="">All</option>
        <option value="audio">Audio</option>
        <option value="video">Video</option>
      </select>

      <span class="controls-divider" aria-hidden="true"></span>

      <button id="scan-btn">Scan library</button>
      <a id="settings-link" href="/setup.html" title="Manage media folders">Settings</a>
      <button id="logout-btn" title="Log out">Log out</button>
    </div>
  </header>

  <main id="main-content" tabindex="-1">
    <div id="scan-banner" class="scan-banner" role="status" aria-live="polite" hidden>
      <p id="scan-banner-text">Scanning your library for media…</p>
      <div class="progress-bar"><div class="progress-bar-fill"></div></div>
    </div>
    <details id="scan-diagnostics" class="scan-diagnostics" hidden>
      <summary>
        <span id="scan-diagnostics-summary"></span>
        <button id="scan-diagnostics-close" type="button" class="dismiss-btn" aria-label="Dismiss scan summary">&times;</button>
      </summary>
      <ul id="scan-diagnostics-list"></ul>
    </details>
    <div id="player-container"></div>

    <div id="home-view">
      <section id="movies-section">
        <h2>Movies</h2>
        <div id="movies-grid" class="poster-grid"></div>
        <div id="movies-pager"></div>
      </section>
      <section id="shows-section">
        <h2>TV Shows</h2>
        <div id="shows-grid" class="poster-grid"></div>
      </section>
    </div>

    <div id="search-view" hidden>
      <ul id="media-list"></ul>
      <div id="pager"></div>
    </div>

    <div id="show-view" hidden>
      <button id="show-back-btn" type="button">&larr; Back</button>
      <h2 id="show-view-title"></h2>
      <div id="show-seasons"></div>
      <details id="show-extras" class="scan-diagnostics" hidden>
        <summary>Extras (<span id="show-extras-count">0</span>)</summary>
        <ul id="show-extras-list"></ul>
      </details>
    </div>
  </main>

  <div id="status-announcer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- hls.min.js is no longer loaded here -- app.js lazy-loads it on demand
       (only when a file actually needs HLS) via player.js's ensureHls(),
       since most playback is direct-play and the 532KB parse/download cost
       was previously paid on every single page view regardless. -->
  <!-- Deliberate exception to the "everything vendored, no CDN" rule
       elsewhere in this app: Google's Cast Web Sender SDK terms prohibit
       self-hosting it, so this one script must load from Google's own CDN.
       `async` is load-bearing, not a perf nicety: without it, this is a
       classic blocking <script src> and the next script tag (app.js) can't
       even start loading until this one finishes -- on a LAN with no
       internet access (a fully supported, documented use case for this
       app), or if gstatic.com is just slow/blocked, that stalled the
       entire app's boot behind an external CDN request that has nothing to
       do with local playback. Cast's own sender API is designed around
       `window.__onGCastApiAvailable` specifically so it can be loaded this
       way -- the framework polls for that callback once it's ready,
       regardless of load order. -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" async></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
