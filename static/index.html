<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#14161a">
  <title>parztream</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header>
    <h1>parztream</h1>
    <div class="controls">
      <label for="search-input" class="sr-only">Search library</label>
      <input id="search-input" type="search" placeholder="Search…">

      <label for="filter" class="sr-only">Filter by media type</label>
      <select id="filter">
        <option value="">All</option>
        <option value="audio">Audio</option>
        <option value="video">Video</option>
      </select>

      <label for="show-select" class="sr-only">Filter by show</label>
      <select id="show-select">
        <option value="">All shows</option>
      </select>

      <span class="controls-divider" aria-hidden="true"></span>

      <button id="scan-btn">Scan library</button>
      <a id="settings-link" href="/setup.html" title="Manage media folders">Settings</a>
      <button id="logout-btn" title="Log out">Log out</button>
    </div>
  </header>

  <main id="main-content" tabindex="-1">
    <div id="scan-banner" class="scan-banner" role="status" aria-live="polite" hidden>
      <p id="scan-banner-text">Scanning your library for media…</p>
      <div class="progress-bar"><div class="progress-bar-fill"></div></div>
    </div>
    <details id="scan-diagnostics" class="scan-diagnostics" hidden>
      <summary id="scan-diagnostics-summary"></summary>
      <ul id="scan-diagnostics-list"></ul>
    </details>
    <div id="player-container"></div>
    <ul id="media-list"></ul>
    <div id="pager"></div>
  </main>

  <div id="status-announcer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Vendored, self-hosted (no CDN) -- lets Chrome/Firefox play the HLS
       streams app/transcode.py produces for files needing a container/audio
       fix. Safari has native HLS support and doesn't need this at all (see
       app.js's playMedia). -->
  <script src="/hls.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
