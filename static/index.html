<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>parztream</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>parztream</h1>
    <div class="controls">
      <select id="filter">
        <option value="">All</option>
        <option value="audio">Audio</option>
        <option value="video">Video</option>
      </select>
      <button id="scan-btn">Scan library</button>
    </div>
  </header>

  <main>
    <ul id="media-list"></ul>
    <div id="pager"></div>
    <div id="player-container"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
