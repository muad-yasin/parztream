<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14161a">
  <title>Log in — parztream</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #14161a;
      color: #e6e6e6;
    }
    .login-card {
      width: 100%;
      max-width: 320px;
      padding: 2rem;
      border: 1px solid #2a2e35;
      border-radius: 8px;
      background: #1e2127;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 1.5rem;
      text-align: center;
    }
    input {
      width: 100%;
      font: inherit;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #3a3f47;
      background: #23262c;
      color: inherit;
      margin-bottom: 1rem;
    }
    #pin {
      font-size: 1.5rem;
      letter-spacing: 0.5em;
      text-align: center;
    }
    button {
      width: 100%;
      font: inherit;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: none;
      background: #7aa2f7;
      color: #14161a;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #93b4f8;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #f78c8c;
      font-size: 0.9rem;
      min-height: 1.2rem;
      margin-top: 0.75rem;
      text-align: center;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <form class="login-card" id="login-form">
    <h1>parztream</h1>
    <label for="pin" class="sr-only">4-digit PIN</label>
    <input
      type="password"
      id="pin"
      inputmode="numeric"
      pattern="[0-9]{4}"
      maxlength="4"
      autocomplete="off"
      placeholder="····"
      autofocus
      required
    >
    <button type="submit">Log in</button>
    <p class="error" id="error" role="alert"></p>
  </form>

  <script>
    const form = document.getElementById("login-form");
    const pinInput = document.getElementById("pin");
    const errorEl = document.getElementById("error");
    const submitBtn = form.querySelector("button");

    // Strip anything non-numeric as it's typed (the numeric keypad on
    // mobile mostly prevents this anyway, but a physical keyboard doesn't),
    // and auto-submit once all 4 digits are in -- matches the PIN-entry
    // convention people already know from phone lock screens.
    pinInput.addEventListener("input", () => {
      pinInput.value = pinInput.value.replace(/\D/g, "").slice(0, 4);
      if (pinInput.value.length === 4) {
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorEl.textContent = "";
      submitBtn.disabled = true;

      let res;
      try {
        res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pin: pinInput.value }),
        });
      } catch (err) {
        errorEl.textContent = "Couldn't reach the server.";
        submitBtn.disabled = false;
        return;
      }

      if (res.ok) {
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next");
        // startsWith("/") alone still passes a protocol-relative URL like
        // "//evil.example" (browsers navigate that as https://evil.example)
        // or a backslash variant like "/\evil.example" (some browsers
        // normalize backslashes to slashes when parsing, turning it into
        // the same thing) -- guard both explicitly.
        const isSafeNext = next && next.startsWith("/") && !next.startsWith("//") && !next.startsWith("/\\");
        window.location.href = isSafeNext ? next : "/";
        return;
      }

      submitBtn.disabled = false;
      pinInput.value = "";
      pinInput.focus();

      if (res.status === 401) {
        errorEl.textContent = "Incorrect PIN.";
      } else if (res.status === 429) {
        const body = await res.json().catch(() => ({}));
        errorEl.textContent = body.detail || "Too many incorrect attempts. Try again shortly.";
      } else {
        errorEl.textContent = "Something went wrong.";
      }
    });
  </script>
</body>
</html>
